version: '3.9'

services:
  # ──────────────────────────────────────────────
  #  Infrastructure
  # ──────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: unicore-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - unicore-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: unicore-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - unicore-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  #  Microservices
  # ──────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: unicore-user-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/unicore_users
      - JWT_SECRET=unicore_jwt_super_secret_key_2024
      - JWT_REFRESH_SECRET=unicore_refresh_super_secret_key_2024
      - JWT_EXPIRES_IN=1d
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - unicore-net

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: unicore-course-service
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/unicore_courses
      - JWT_SECRET=unicore_jwt_super_secret_key_2024
      - USER_SERVICE_URL=http://user-service:3001
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - unicore-net

  assessment-service:
    build:
      context: ./assessment-service
      dockerfile: Dockerfile
    container_name: unicore-assessment-service
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      - PORT=3003
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/unicore_assessments
      - JWT_SECRET=unicore_jwt_super_secret_key_2024
      - COURSE_SERVICE_URL=http://course-service:3002
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - unicore-net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: unicore-notification-service
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      - PORT=3004
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/unicore_notifications
      - JWT_SECRET=unicore_jwt_super_secret_key_2024
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - unicore-net

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: unicore-analytics-service
    restart: unless-stopped
    ports:
      - '3005:3005'
    environment:
      - PORT=3005
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/unicore_analytics
      - JWT_SECRET=unicore_jwt_super_secret_key_2024
      - USER_SERVICE_URL=http://user-service:3001
      - COURSE_SERVICE_URL=http://course-service:3002
      - ASSESSMENT_SERVICE_URL=http://assessment-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - unicore-net

  # ──────────────────────────────────────────────
  #  API Gateway (single entry point)
  # ──────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: unicore-api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=unicore_jwt_super_secret_key_2024
      - CLIENT_URL=http://localhost:5173
      - USER_SERVICE_URL=http://user-service:3001
      - COURSE_SERVICE_URL=http://course-service:3002
      - ASSESSMENT_SERVICE_URL=http://assessment-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
    depends_on:
      - user-service
      - course-service
      - assessment-service
      - notification-service
      - analytics-service
    networks:
      - unicore-net

  # ──────────────────────────────────────────────
  #  Frontend
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unicore-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api-gateway
    networks:
      - unicore-net

# ──────────────────────────────────────────────
#  Networks & Volumes
# ──────────────────────────────────────────────
networks:
  unicore-net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
